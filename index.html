<!doctype html>
<html lang="en">
  <head>
    <title>To Do Application</title>
    <style>
      body {
        background-color: rgb(221, 221, 237);
      }
      .todo-items {
        border: 0.6px solid;
        background-color: white;
        margin: 10px;
        padding: 10px;
        border-radius: 5px;
        font-size: 20px;
        display: flex;
        justify-content: space-between;
        cursor: pointer;
      }
      .todo-items:hover {
        box-shadow: 2px 2px 5px rgb(72, 70, 70);
      }
      .to-do-items-input {
        padding: 15px 40px;
        display: flex;
        justify-content: center;
      }
      .todo-container {
        height: 500px;
        overflow-y: scroll;
      }
      .heading {
        text-align: center;
        margin: 0px;
        color: rgb(11, 11, 74);
        font-size: 60px;
      }
      .delete-todo-item {
        height: 20px;
      }
      .add-todo-btn {
        border-radius: 20px;
        padding: 10px;
        margin-left: 50px;
        cursor: pointer;
        width: 100px;
      }
      .add-todo-btn:hover {
        transform: scale(1.1);
        background-color: rgb(196, 196, 217);
      }
      .new-todo-item {
        border-radius: 20px;
        width: 350px;
        padding: 10px;
        outline: none;
      }
      .main-container {
        border: 0.5px solid black;
        width: 550px;
        margin-left: 500px;
        margin-top: 20px;
        border-radius: 10px;
        padding: 13px;
        background-color: #d2d2ff;
      }
    </style>
  </head>
